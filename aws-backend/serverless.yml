service: serverless-chat-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    CONNECTIONS_TABLE: ${self:service}-connections-${sls:stage}
    MESSAGES_TABLE: ${self:service}-messages-${sls:stage}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
  iam:
    role:
      statements:
        # Scoped to Connections Table only (Enhancement #7)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:GetItem
          Resource:
            - Fn::GetAtt: [ConnectionsTable, Arn]
        # Scoped to Messages Table only (Enhancement #7)
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Query
          Resource:
            - Fn::GetAtt: [MessagesTable, Arn]
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - "arn:aws:execute-api:*:*:**/@connections/*"

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    websocketPort: 4001
    host: localhost

functions:
  connect:
    handler: handler.connect
    events:
      - websocket:
          route: $connect
  disconnect:
    handler: handler.disconnect
    events:
      - websocket:
          route: $disconnect
  default:
    handler: handler.defaultMessage
    events:
      - websocket:
          route: $default
  sendMessage:
    handler: handler.sendMessage
    events:
      - websocket:
          route: sendMessage
  typing:
    handler: handler.typing
    events:
      - websocket:
          route: typing
  getRecentMessages:
    handler: handler.getRecentMessages
    events:
      - websocket:
          route: getRecentMessages

resources:
  Resources:
    # Connections Table — stores active connectionId, username, roomName
    ConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.CONNECTIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # Messages Table — Enhancement #1: proper HASH+RANGE for room-based history queries
    MessagesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.MESSAGES_TABLE}
        AttributeDefinitions:
          - AttributeName: roomName
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: N
        KeySchema:
          - AttributeName: roomName
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
